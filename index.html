<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edge AI 智能考勤：多角度動態融合追蹤</title>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #2c3e50; margin-bottom: 5px; }
        .subtitle { color: #7f8c8d; margin-bottom: 20px; font-size: 14px; }
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            max-width: 1200px;
            width: 100%;
        }
        .video-box {
            position: relative;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 640px;
            height: 480px;
        }
        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 640px;
            height: 480px;
        }
        .control-panel {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            flex: 1;
            min-width: 350px;
            max-height: 480px;
            display: flex;
            flex-direction: column;
        }
        .btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 15px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn:hover { background-color: #27ae60; }
        .log-table-container {
            flex: 1;
            overflow-y: auto;
            margin-top: 10px;
            border: 1px solid #eee;
            border-radius: 6px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th { background-color: #f8f9fa; position: sticky; top: 0; }
        .status {
            font-weight: bold;
            color: #34495e;
            margin-bottom: 15px;
            background: #e1e8ed;
            padding: 8px 16px;
            border-radius: 20px;
        }
        .badge {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
        }
        .badge-active { background-color: #2ecc71; color: white; }
        .badge-away { background-color: #95a5a6; color: white; }
    </style>
</head>
<body>

    <h1>Edge AI 智能考勤系統 (多角度修復版)</h1>
    <div class="subtitle">全自動零操作：動態學習側臉特徵，防止轉頭重複註冊</div>

    <div id="status" class="status">正在載入本地 NPU/GPU 加速模型...</div>

    <div class="container">
        <div class="video-box">
            <video id="video" autoplay muted playsinline></video>
            <canvas id="overlay"></canvas>
        </div>

        <div class="control-panel">
            <button class="btn" onclick="exportCSV()">匯出紀錄 (CSV)</button>
            <h3 style="margin: 10px 0;">即時狀態追蹤表</h3>
            <div class="log-table-container">
                <table>
                    <thead>
                        <tr>
                            <th>自動命名標籤</th>
                            <th>當前狀態</th>
                            <th>已學習角度</th>
                            <th>累計出現次數</th>
                            <th>最後現身時間</th>
                        </tr>
                    </thead>
                    <tbody id="logTrack">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('overlay');
        const statusDiv = document.getElementById('status');
        
        let faceMatcher = null;
        let labeledFaceDescriptors = []; // 存儲結構：[ LabeledFaceDescriptors(name, [desc1, desc2, ...]) ]
        let userDatabase = {}; 

        const AWAY_TIMEOUT = 6000;      // 離開閾值 6 秒
        const MATCH_THRESHOLD = 0.52;   // 比對閾值（越低越嚴格，0.52 較適合兼顧側臉）
        const UPDATE_THRESHOLD = 0.42;  // 自動學習更新閾值（當判定是某人，且距離小於 0.42 時，自動把新角度追加進去）

        async function init() {
            try {
                statusDiv.innerText = "正在從網絡載入微型人臉特徵庫...";
                const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
                await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
                
                statusDiv.innerText = "AI 引擎就緒，正在喚醒相機...";
                startVideo();
            } catch (err) {
                statusDiv.innerText = "初始化失敗: " + err.message;
            }
        }

        function startVideo() {
            navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } })
                .then(stream => {
                    video.srcObject = stream;
                    statusDiv.innerText = "🟢 系統監控中（請面向鏡頭，並慢慢向左、右轉頭讓系統學習你的側臉）";
                    video.addEventListener('play', onProcessLoop);
                })
                .catch(err => {
                    statusDiv.innerText = "無法獲取相機權限: " + err.message;
                });
        }

        function generateFeatureName(descriptor) {
            let sum = 0;
            for(let i = 0; i < 5; i++) { sum += Math.abs(descriptor[i]); }
            const hexCode = Math.floor(sum * 10000).toString(16).toUpperCase().substring(0, 4);
            return `用戶-${hexCode}`;
        }

        async function onProcessLoop() {
            if (video.paused || video.ended) return setTimeout(() => onProcessLoop(), 1000);

            const detections = await faceapi.detectAllFaces(video)
                .withFaceLandmarks()
                .withFaceDescriptors();

            const displaySize = { width: 640, height: 480 };
            faceapi.matchDimensions(canvas, displaySize);
            const resizedDetections = faceapi.resizeResults(detections, displaySize);
            
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const now = Date.now();
            let currentFrameDetectedNames = new Set();

            resizedDetections.forEach(detection => {
                let matchedName = null;
                let bestMatchResult = null;

                // 1. 比對現有特徵庫
                if (faceMatcher && labeledFaceDescriptors.length > 0) {
                    bestMatchResult = faceMatcher.findBestMatch(detection.descriptor);
                    // 如果匹配度小於設定閾值，認定為同一個人
                    if (bestMatchResult.label !== 'unknown' && bestMatchResult.distance < MATCH_THRESHOLD) {
                        matchedName = bestMatchResult.label;
                    }
                }

                // 2. 自動註冊新用戶
                if (!matchedName) {
                    matchedName = generateFeatureName(detection.descriptor);
                    let finalName = matchedName;
                    let counter = 1;
                    while (userDatabase[finalName]) {
                        finalName = `${matchedName}_${counter}`;
                        counter++;
                    }
                    matchedName = finalName;

                    // 註冊時，建立擁有一個特徵向量的陣列
                    const newLabelObj = new faceapi.LabeledFaceDescriptors(matchedName, [detection.descriptor]);
                    labeledFaceDescriptors.push(newLabelObj);
                    faceMatcher = new faceapi.FaceMatcher(labeledFaceDescriptors);
                } 
                // 3. 【動態學習】如果認出是已知用戶，但這是一個稍微不同的新角度
                else if (bestMatchResult && bestMatchResult.distance > 0.35) {
                    // 當前角度與現有特徵有一定差異，但又確認是你時，把這個新角度追加到你的特徵列表裡
                    const targetUser = labeledFaceDescriptors.find(l => l.label === matchedName);
                    if (targetUser && targetUser.descriptors.length < 15) { // 每個用戶最多儲存 15 個角度特徵防止過載
                        targetUser.descriptors.push(detection.descriptor);
                        // 重新整理識別引擎
                        faceMatcher = new faceapi.FaceMatcher(labeledFaceDescriptors);
                    }
                }

                currentFrameDetectedNames.add(matchedName);

                // 4. 更新數據庫狀態
                if (!userDatabase[matchedName]) {
                    userDatabase[matchedName] = {
                        count: 1,
                        lastSeenTimestamp: now,
                        status: "在線"
                    };
                } else {
                    const timeElapsed = now - userDatabase[matchedName].lastSeenTimestamp;
                    if (userDatabase[matchedName].status === "離開" && timeElapsed > AWAY_TIMEOUT) {
                        userDatabase[matchedName].count += 1;
                    }
                    userDatabase[matchedName].lastSeenTimestamp = now;
                    userDatabase[matchedName].status = "在線";
                }

                // 獲取該用戶目前學習了多少個特徵角度
                const featureCount = labeledFaceDescriptors.find(l => l.label === matchedName)?.descriptors.length || 1;
                userDatabase[matchedName].anglesLearned = featureCount;

                // 畫框
                const box = detection.detection.box;
                const drawBox = new faceapi.draw.DrawBox(box, { label: `${matchedName} (角度學習中)` });
                drawBox.draw(canvas);
            });

            // 5. 離線檢查
            for (let name in userDatabase) {
                if (!currentFrameDetectedNames.has(name)) {
                    if (now - userDatabase[name].lastSeenTimestamp > AWAY_TIMEOUT) {
                        userDatabase[name].status = "離開";
                    }
                }
            }

            renderTable();
            setTimeout(() => onProcessLoop(), 250); // 每秒跑 4 次，保持流暢與學習效率
        }

        function renderTable() {
            const tbody = document.getElementById('logTrack');
            tbody.innerHTML = '';
            
            for (let name in userDatabase) {
                const tr = document.createElement('tr');
                const user = userDatabase[name];
                const lastSeenTime = new Date(user.lastSeenTimestamp).toLocaleTimeString();
                
                const statusBadge = user.status === "在線" 
                    ? `<span class="badge badge-active">偵測中 (在線)</span>`
                    : `<span class="badge badge-away">已離開</span>`;

                tr.innerHTML = `
                    <td><strong>${name}</strong></td>
                    <td>${statusBadge}</td>
                    <td><span style="color:#e67e22; font-weight:bold;">${user.anglesLearned || 1} 個骨骼視角</span></td>
                    <td><b style="color:#2980b9; font-size:15px;">${user.count}</b> 次</td>
                    <td>${lastSeenTime}</td>
                `;
                tbody.appendChild(tr);
            }
        }

        function exportCSV() {
            let csvContent = "data:text/csv;charset=utf-8,\uFEFF用戶標籤,已儲存特徵數,累計出現次數,最後現身時間,最終狀態\n";
            for (let name in userDatabase) {
                const user = userDatabase[name];
                const timeStr = new Date(user.lastSeenTimestamp).toLocaleTimeString();
                csvContent += `${name},${user.anglesLearned},${user.count},${timeStr},${user.status}\n`;
            }
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `AI_MultiAngle_Track_${new Date().toISOString().slice(0,10)}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        window.onload = init;
    </script>
</body>
</html>
