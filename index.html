<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edge AI 智能考勤：自動註冊與在線追蹤</title>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #2c3e50; margin-bottom: 5px; }
        .subtitle { color: #7f8c8d; margin-bottom: 20px; font-size: 14px; }
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            max-width: 1200px;
            width: 100%;
        }
        .video-box {
            position: relative;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 640px;
            height: 480px;
        }
        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 640px;
            height: 480px;
        }
        .control-panel {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            flex: 1;
            min-width: 350px;
            max-height: 480px;
            display: flex;
            flex-direction: column;
        }
        .btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 15px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn:hover { background-color: #27ae60; }
        .log-table-container {
            flex: 1;
            overflow-y: auto;
            margin-top: 10px;
            border: 1px solid #eee;
            border-radius: 6px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th { background-color: #f8f9fa; position: sticky; top: 0; }
        .status {
            font-weight: bold;
            color: #34495e;
            margin-bottom: 15px;
            background: #e1e8ed;
            padding: 8px 16px;
            border-radius: 20px;
        }
        .badge {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
        }
        .badge-active { background-color: #2ecc71; color: white; }
        .badge-away { background-color: #95a5a6; color: white; }
    </style>
</head>
<body>

    <h1>Edge AI 智能考勤系統</h1>
    <div class="subtitle">全自動零操作：自動註冊、自動特徵命名、防刷屏在線追蹤</div>

    <div id="status" class="status">正在載入本地 NPU/GPU 加速模型...</div>

    <div class="container">
        <div class="video-box">
            <video id="video" autoplay muted playsinline></video>
            <canvas id="overlay"></canvas>
        </div>

        <div class="control-panel">
            <button class="btn" onclick="exportCSV()">匯出紀錄 (CSV)</button>
            
            <h3 style="margin: 10px 0;">即時狀態追蹤表</h3>
            <div class="log-table-container">
                <table>
                    <thead>
                        <tr>
                            <th>自動命名標籤</th>
                            <th>當前狀態</th>
                            <th>累計出現次數</th>
                            <th>最後現身時間</th>
                        </tr>
                    </thead>
                    <tbody id="logTrack">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('overlay');
        const statusDiv = document.getElementById('status');
        
        let faceMatcher = null;
        let labeledFaceDescriptors = [];
        let userDatabase = {}; 
        /* userDatabase 結構:
          {
             "新用戶-X7B2": {
                count: 1,                // 累計出現次數
                lastSeenTimestamp: 1234, // 最後一次被偵測到的時間戳
                status: "在線"           // "在線" 或 "離開"
             }
          }
        */

        const AWAY_TIMEOUT = 5000; // 離開閾值設定為 5 秒（若消失超過5秒，下次回來算新的一次）

        // 1. 初始化 AI 模型
        async function init() {
            try {
                statusDiv.innerText = "正在從網絡載入微型人臉特徵庫...";
                const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
                await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
                
                statusDiv.innerText = "AI 引擎就緒，正在喚醒相機...";
                startVideo();
            } catch (err) {
                statusDiv.innerText = "初始化失敗: " + err.message;
            }
        }

        // 2. 開啟相機
        function startVideo() {
            navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } })
                .then(stream => {
                    video.srcObject = stream;
                    statusDiv.innerText = "🟢 系統監控中（鏡頭前出現未註冊人士會自動錄入）";
                    video.addEventListener('play', onProcessLoop);
                })
                .catch(err => {
                    statusDiv.innerText = "無法獲取相機權限: " + err.message;
                });
        }

        // 3. 根據人臉特徵 Descriptor 生成唯一的 4 位短碼作為「特徵名字」
        function generateFeatureName(descriptor) {
            // 取特徵向量的前 5 個數值的絕對值求和，映射為 16 進制，確保同一個人的特徵算出來的名字極度接近
            let sum = 0;
            for(let i = 0; i < 5; i++) {
                sum += Math.abs(descriptor[i]);
            }
            const hexCode = Math.floor(sum * 10000).toString(16).toUpperCase().substring(0, 4);
            return `新用戶-${hexCode}`;
        }

        // 4. 核心偵測、自動註冊與在線更新邏輯
        async function onProcessLoop() {
            if (video.paused || video.ended) return setTimeout(() => onProcessLoop(), 1000);

            // 1. 抓取鏡頭中所有人臉
            const detections = await faceapi.detectAllFaces(video)
                .withFaceLandmarks()
                .withFaceDescriptors();

            const displaySize = { width: 640, height: 480 };
            faceapi.matchDimensions(canvas, displaySize);
            const resizedDetections = faceapi.resizeResults(detections, displaySize);
            
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const now = window.performance.now() ? Date.now() : new Date().getTime();
            let currentFrameDetectedNames = new Set();

            // 2. 遍歷當前幀看到的每一張臉
            resizedDetections.forEach(detection => {
                let matchedName = null;

                // 如果已有註冊庫，先比對
                if (faceMatcher && labeledFaceDescriptors.length > 0) {
                    const bestMatch = faceMatcher.findBestMatch(detection.descriptor);
                    if (bestMatch.label !== 'unknown' && bestMatch.distance < 0.5) {
                        matchedName = bestMatch.label;
                    }
                }

                // 【自動註冊】如果沒找到匹配，說明是全新的面孔，立刻進行自動命名並註冊
                if (!matchedName) {
                    matchedName = generateFeatureName(detection.descriptor);
                    
                    // 防止特徵微調時名字發生微小碰撞，重名則加後綴
                    let finalName = matchedName;
                    let counter = 1;
                    while (userDatabase[finalName]) {
                        finalName = `${matchedName}_${counter}`;
                        counter++;
                    }
                    matchedName = finalName;

                    // 寫入本地 AI 內存識別庫
                    labeledFaceDescriptors.push(new faceapi.LabeledFaceDescriptors(matchedName, [detection.descriptor]));
                    faceMatcher = new faceapi.FaceMatcher(labeledFaceDescriptors);
                }

                currentFrameDetectedNames.add(matchedName);

                // 【核心狀態邏輯】更新用戶在線狀態與次數
                if (!userDatabase[matchedName]) {
                    // 全新註冊進數據庫：次數=1，狀態=在線
                    userDatabase[matchedName] = {
                        count: 1,
                        lastSeenTimestamp: now,
                        status: "在線"
                    };
                } else {
                    // 已存在的用戶
                    const timeElapsedSinceLastSeen = now - userDatabase[matchedName].lastSeenTimestamp;

                    if (userDatabase[matchedName].status === "離開" && timeElapsedSinceLastSeen > AWAY_TIMEOUT) {
                        // 判定：用戶之前離開了（且消失超過5秒），現在是「重新回來」，次數加 1
                        userDatabase[matchedName].count += 1;
                    }
                    
                    // 如果他「一直站在鏡頭前」，只會走到這一步：更新時間，保持在線，【次數不會增加】
                    userDatabase[matchedName].lastSeenTimestamp = now;
                    userDatabase[matchedName].status = "在線";
                }

                // 在畫面上繪製識別框與名字
                const box = detection.detection.box;
                const drawBox = new faceapi.draw.DrawBox(box, { label: `${matchedName} (Tracking)` });
                drawBox.draw(canvas);
            });

            // 3. 【離線掃描】檢查那些在數據庫裡、但這一幀沒有出現在鏡頭前的用戶
            for (let name in userDatabase) {
                if (!currentFrameDetectedNames.has(name)) {
                    // 如果這個人這幀不在，且距離最後現身時間超過 5 秒，則狀態改為「離開」
                    if (now - userDatabase[name].lastSeenTimestamp > AWAY_TIMEOUT) {
                        userDatabase[name].status = "離開";
                    }
                }
            }

            // 4. 更新表格
            renderTable();

            // 每 300 毫秒跑一次，降低 CPU/NPU 負擔，運行依然非常流暢
            setTimeout(() => onProcessLoop(), 300);
        }

        // 5. 渲染表格數據
        function renderTable() {
            const tbody = document.getElementById('logTrack');
            tbody.innerHTML = '';
            
            for (let name in userDatabase) {
                const tr = document.createElement('tr');
                const user = userDatabase[name];
                const lastSeenTime = new Date(user.lastSeenTimestamp).toLocaleTimeString();
                
                const statusBadge = user.status === "在線" 
                    ? `<span class="badge badge-active">偵測中 (在線)</span>`
                    : `<span class="badge badge-away">已離開</span>`;

                tr.innerHTML = `
                    <td><strong>${name}</strong></td>
                    <td>${statusBadge}</td>
                    <td><b style="color:#2980b9; font-size:15px;">${user.count}</b> 次</td>
                    <td>${lastSeenTime}</td>
                `;
                tbody.appendChild(tr);
            }
        }

        // 6. 匯出 CSV 紀錄檔案
        function exportCSV() {
            let csvContent = "data:text/csv;charset=utf-8,\uFEFF特徵用戶標籤,累計出現次數,最後現身時間,最終狀態\n";
            for (let name in userDatabase) {
                const user = userDatabase[name];
                const timeStr = new Date(user.lastSeenTimestamp).toLocaleTimeString();
                csvContent += `${name},${user.count},${timeStr},${user.status}\n`;
            }
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `AI_Continuous_Track_${new Date().toISOString().slice(0,10)}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        window.onload = init;
    </script>
</body>
</html>
