<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edge AI 智能考勤：多模態頭像管理與手動合併版</title>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f6f9; color: #333; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #2c3e50; margin-bottom: 5px; }
        .subtitle { color: #7f8c8d; margin-bottom: 20px; font-size: 14px; }
        .container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; max-width: 1400px; width: 100%; }
        .video-box { position: relative; background: #000; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 640px; height: 480px; }
        video, canvas { position: absolute; top: 0; left: 0; width: 640px; height: 480px; }
        .control-panel { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); flex: 1; min-width: 350px; max-height: 480px; display: flex; flex-direction: column; }
        
        /* 全新頭像管理面板樣式 */
        .manager-panel { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 1360px; margin-top: 20px; }
        .user-grid { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 15px; }
        .user-card { background: #f8f9fa; border: 2px solid #e2e8f0; border-radius: 8px; padding: 10px; width: 150px; text-align: center; display: flex; flex-direction: column; align-items: center; position: relative; transition: all 0.2s; }
        .user-card.selected { border-color: #3498db; background-color: #ebf8ff; }
        .user-avatar { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); background: #ddd; margin-bottom: 8px; }
        .user-checkbox { position: absolute; top: 10px; left: 10px; width: 18px; height: 18px; cursor: pointer; }
        
        .btn { background-color: #3498db; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; margin-right: 10px; }
        .btn:hover { background-color: #2980b9; }
        .btn-success { background-color: #2ecc71; }
        .btn-success:hover { background-color: #27ae60; }
        .btn-warning { background-color: #e67e22; }
        .btn-warning:hover { background-color: #d35400; }
        
        .log-table-container { flex: 1; overflow-y: auto; margin-top: 10px; border: 1px solid #eee; border-radius: 6px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #f8f9fa; position: sticky; top: 0; }
        .status { font-weight: bold; color: #fff; margin-bottom: 15px; background: #2c3e50; padding: 8px 16px; border-radius: 20px; }
        .badge { padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .badge-active { background-color: #2ecc71; color: white; }
        .badge-away { background-color: #95a5a6; color: white; }
    </style>
</head>
<body>

    <h1>Edge AI 工業級多目標考勤系統 (手動合併功能版)</h1>
    <div class="subtitle">支援本地 NPU/GPU 加速：當發現誤判時，可勾選多個頭像進行特徵融合與數據合併</div>

    <div id="status" class="status">正在配置 WebGPU/WebNN 加速管道並載入大模型...</div>

    <div class="container">
        <div class="video-box">
            <video id="video" autoplay muted playsinline></video>
            <canvas id="overlay"></canvas>
        </div>

        <div class="control-panel">
            <button class="btn btn-success" onclick="exportCSV()" style="margin-bottom: 15px;">匯出考勤紀錄 (CSV)</button>
            <h3 style="margin: 10px 0;">多人辨識動態日誌</h3>
            <div class="log-table-container">
                <table>
                    <thead>
                        <tr>
                            <th>用戶標籤</th>
                            <th>當前狀態</th>
                            <th>累計次數</th>
                            <th>最後現身時間</th>
                        </tr>
                    </thead>
                    <tbody id="logTrack"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="manager-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px;">
            <h3 style="margin: 0;">視覺化用戶名冊（勾選以合併同一個人的多個標籤）</h3>
            <button class="btn btn-warning" onclick="mergeSelectedUsers()">合併選中的用戶</button>
        </div>
        <div class="user-grid" id="userGrid">
            </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('overlay');
        const statusDiv = document.getElementById('status');
        const userGrid = document.getElementById('userGrid');
        
        let faceMatcher = null;
        let labeledFaceDescriptors = [];
        let userDatabase = {}; 

        const AWAY_TIMEOUT = 5000; 
        const MATCH_THRESHOLD = 0.65; // 工業級大模型基礎閾值

        async function init() {
            try {
                statusDiv.innerText = "正在載入人臉特徵庫與硬體加速驅動...";
                const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
                await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
                
                statusDiv.innerText = "🚀 成功偵測到強勁硬體加速！監控已自動啟動。";
                startVideo();
            } catch (err) {
                statusDiv.innerText = "大模型載入失敗: " + err.message;
            }
        }

        function startVideo() {
            navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } })
                .then(stream => {
                    video.srcObject = stream;
                    video.addEventListener('play', onProcessLoop);
                })
                .catch(err => { statusDiv.innerText = "無法獲取相機: " + err.message; });
        }

        function generateFeatureName(descriptor) {
            let hash = 0;
            for (let i = 0; i < 5; i++) { hash += Math.abs(descriptor[i]) * Math.sin(i); }
            const hexCode = Math.floor(Math.abs(hash) * 10000).toString(16).toUpperCase().substring(0, 4);
            return `用戶-${hexCode}`;
        }

        // 【全新核心功能】從 Video 中將人臉裁剪出來並轉為 Base64 圖片
        function cropFaceImage(videoEl, box) {
            try {
                const tempCanvas = document.createElement('canvas');
                const tCtx = tempCanvas.getContext('2d');
                // 稍微向外擴展 20% 的邊界，讓頭像看起來更自然舒適
                const padX = box.width * 0.2;
                const padY = box.height * 0.2;
                
                tempCanvas.width = 120;
                tempCanvas.height = 120;
                
                tCtx.drawImage(
                    videoEl,
                    box.x - padX/2, box.y - padY/2, box.width + padX, box.height + padY,
                    0, 0, 120, 120
                );
                return tempCanvas.toDataURL('image/jpeg', 0.8);
            } catch (e) {
                return ''; // 防禦性出錯返回空
            }
        }

        async function onProcessLoop() {
            if (video.paused || video.ended) return setTimeout(() => onProcessLoop(), 1000);

            const detections = await faceapi.detectAllFaces(video).withFaceLandmarks().withFaceDescriptors();
            const displaySize = { width: 640, height: 480 };
            faceapi.matchDimensions(canvas, displaySize);
            const resizedDetections = faceapi.resizeResults(detections, displaySize);
            
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const now = Date.now();
            let currentFrameDetectedNames = new Set();

            resizedDetections.forEach(detection => {
                let matchedName = null;

                if (faceMatcher && labeledFaceDescriptors.length > 0) {
                    const bestMatch = faceMatcher.findBestMatch(detection.descriptor);
                    if (bestMatch.label !== 'unknown' && bestMatch.distance < MATCH_THRESHOLD) {
                        matchedName = bestMatch.label;
                    }
                }

                // 新用戶註冊
                if (!matchedName) {
                    matchedName = generateFeatureName(detection.descriptor);
                    let finalName = matchedName;
                    let counter = 1;
                    while (userDatabase[finalName]) {
                        finalName = `${matchedName}_${counter}`;
                        counter++;
                    }
                    matchedName = finalName;

                    // 截取當前最新的人臉頭像圖片
                    const avatarDataUrl = cropFaceImage(video, detection.detection.box);

                    // 寫入本地 AI 特徵庫
                    labeledFaceDescriptors.push(new faceapi.LabeledFaceDescriptors(matchedName, [detection.descriptor]));
                    faceMatcher = new faceapi.FaceMatcher(labeledFaceDescriptors);

                    // 初始化用戶數據結構（加入 avatar 欄位）
                    userDatabase[matchedName] = { 
                        count: 1, 
                        lastSeenTimestamp: now, 
                        status: "在線",
                        avatar: avatarDataUrl 
                    };
                    
                    // 觸發重新渲染名冊面板
                    renderUserGrid();
                } else {
                    // 已有用戶：動態追加新角度
                    const targetUser = labeledFaceDescriptors.find(l => l.label === matchedName);
                    if (targetUser && targetUser.descriptors.length < 30) {
                        targetUser.descriptors.push(detection.descriptor);
                        faceMatcher = new faceapi.FaceMatcher(labeledFaceDescriptors);
                    }
                }

                currentFrameDetectedNames.add(matchedName);

                // 更新狀態與計數
                if (userDatabase[matchedName]) {
                    const timeElapsed = now - userDatabase[matchedName].lastSeenTimestamp;
                    if (userDatabase[matchedName].status === "離開" && timeElapsed > AWAY_TIMEOUT) {
                        userDatabase[matchedName].count += 1;
                    }
                    userDatabase[matchedName].lastSeenTimestamp = now;
                    userDatabase[matchedName].status = "在線";
                }

                const box = detection.detection.box;
                const drawBox = new faceapi.draw.DrawBox(box, { label: `${matchedName} (Verified)` });
                drawBox.draw(canvas);
            });

            // 離線檢查
            for (let name in userDatabase) {
                if (!currentFrameDetectedNames.has(name)) {
                    if (now - userDatabase[name].lastSeenTimestamp > AWAY_TIMEOUT) {
                        userDatabase[name].status = "離開";
                    }
                }
            }

            renderTable();
            setTimeout(() => onProcessLoop(), 200); 
        }

        // 渲染日誌表格
        function renderTable() {
            const tbody = document.getElementById('logTrack');
            tbody.innerHTML = '';
            for (let name in userDatabase) {
                const tr = document.createElement('tr');
                const user = userDatabase[name];
                const statusBadge = user.status === "在線" 
                    ? `<span class="badge badge-active">在線</span>`
                    : `<span class="badge badge-away">已離開</span>`;

                tr.innerHTML = `
                    <td><strong>${name}</strong></td>
                    <td>${statusBadge}</td>
                    <td><b>${user.count}</b> 次</td>
                    <td>${new Date(user.lastSeenTimestamp).toLocaleTimeString()}</td>
                `;
                tbody.appendChild(tr);
            }
        }

        // 【全新功能】渲染名冊與頭像面板
        function renderUserGrid() {
            userGrid.innerHTML = '';
            for (let name in userDatabase) {
                const user = userDatabase[name];
                const card = document.createElement('div');
                card.className = 'user-card';
                card.id = `card-${name}`;
                
                card.innerHTML = `
                    <input type="checkbox" class="user-checkbox" value="${name}" onchange="toggleCardSelect('${name}', this)">
                    <img class="user-avatar" src="${user.avatar || 'https://via.placeholder.com/100'}" alt="Face">
                    <div style="font-size: 12px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 100%;">${name}</div>
                `;
                userGrid.appendChild(card);
            }
        }

        function toggleCardSelect(name, checkbox) {
            const card = document.getElementById(`card-${name}`);
            if (checkbox.checked) {
                card.classList.add('selected');
            } else {
                card.classList.remove('selected');
            }
        }

        // 【全新核心功能】手動合併多個誤判的用戶標籤
        function mergeSelectedUsers() {
            const checkboxes = document.querySelectorAll('.user-checkbox:checked');
            if (checkboxes.length < 2) {
                alert("請至少勾選 2 個或以上的頭像進行合併！");
                return;
            }

            const namesToMerge = Array.from(checkboxes).map(cb => cb.value);
            // 挑選第一個勾選的用戶作為「主導 ID（保留名字、頭像）」
            const primaryName = namesToMerge[0];
            
            if (!confirm(`確定要將 [${namesToMerge.join(', ')}] 全部合併到 ${primaryName} 名下嗎？\n這會將它們的所有角度特徵和考勤數據進行合流。`)) return;

            const primaryUserInDB = userDatabase[primaryName];
            const primaryUserInAI = labeledFaceDescriptors.find(l => l.label === primaryName);

            // 開始將其餘 ID 的特徵與次數合流到 primaryName
            for (let i = 1; i < namesToMerge.length; i++) {
                const secondaryName = namesToMerge[i];
                
                // 1. 合併次數數據
                primaryUserInDB.count += userDatabase[secondaryName].count;
                // 保留兩者中最新的現身時間
                if (userDatabase[secondaryName].lastSeenTimestamp > primaryUserInDB.lastSeenTimestamp) {
                    primaryUserInDB.lastSeenTimestamp = userDatabase[secondaryName].lastSeenTimestamp;
                }

                // 2. 深度特徵融合：把副 ID 已經學到的所有人臉特徵向量，強行追加到主 ID 的特徵組中
                const secondaryUserInAI = labeledFaceDescriptors.find(l => l.label === secondaryName);
                if (primaryUserInAI && secondaryUserInAI) {
                    primaryUserInAI.descriptors.push(...secondaryUserInAI.descriptors);
                }

                // 3. 從本地數據庫中刪除副 ID
                delete userDatabase[secondaryName];
                
                // 4. 從 AI 比對引擎的列表中移除副 ID
                labeledFaceDescriptors = labeledFaceDescriptors.filter(l => l.label !== secondaryName);
            }

            // 5. 重新刷新 AI 比對識別器（此時 primaryName 已經完全吞噬了其他角度的特徵）
            faceMatcher = new faceapi.FaceMatcher(labeledFaceDescriptors);

            // 6. 重新刷新網頁上的 UI 面板
            renderUserGrid();
            renderTable();
            
            alert(`合併成功！系統已完成動態特徵融合。現在無論你轉到剛才哪個側面，系統都會精確識別為：${primaryName}`);
        }

        function exportCSV() {
            let csvContent = "data:text/csv;charset=utf-8,\uFEFF用戶標籤,累計出現次數,最後現身時間,狀態\n";
            for (let name in userDatabase) {
                const user = userDatabase[name];
                csvContent += `${name},${user.count},${new Date(user.lastSeenTimestamp).toLocaleTimeString()},${user.status}\n`;
            }
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `AI_Merged_Attendance_${new Date().toISOString().slice(0,10)}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        window.onload = init;
    </script>
</body>
</html>
