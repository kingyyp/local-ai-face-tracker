<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edge AI 智能考勤：工業級情緒分佈與視覺化統計系統</title>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f6f9; color: #333; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #2c3e50; margin-bottom: 5px; }
        .subtitle { color: #7f8c8d; margin-bottom: 20px; font-size: 14px; }
        .container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; max-width: 1400px; width: 100%; }
        .video-box { position: relative; background: #000; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 640px; height: 480px; }
        video, canvas { position: absolute; top: 0; left: 0; width: 640px; height: 480px; }
        .control-panel { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); flex: 1; min-width: 500px; max-height: 480px; display: flex; flex-direction: column; }
        
        .manager-panel { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 1360px; margin-top: 20px; }
        .user-grid { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 15px; }
        .user-card { background: #f8f9fa; border: 2px solid #e2e8f0; border-radius: 8px; padding: 10px; width: 160px; text-align: center; display: flex; flex-direction: column; align-items: center; position: relative; }
        .user-card.selected { border-color: #3498db; background-color: #ebf8ff; }
        .user-avatar { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); background: #ddd; margin-bottom: 8px; }
        .user-checkbox { position: absolute; top: 10px; left: 10px; width: 18px; height: 18px; cursor: pointer; }
        
        .btn { background-color: #3498db; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; margin-right: 10px; }
        .btn-success { background-color: #2ecc71; }
        .btn-warning { background-color: #e67e22; }
        
        .log-table-container { flex: 1; overflow-y: auto; margin-top: 10px; border: 1px solid #eee; border-radius: 6px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #f8f9fa; position: sticky; top: 0; }
        .status { font-weight: bold; color: #fff; margin-bottom: 15px; background: #2c3e50; padding: 8px 16px; border-radius: 20px; text-align: center; width: 80%; max-width: 600px; }
        .badge { padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .badge-active { background-color: #2ecc71; color: white; }
        .badge-away { background-color: #95a5a6; color: white; }
        
        .clickable-name { color: #3498db; cursor: pointer; text-decoration: underline; }
        .clickable-name:hover { color: #2980b9; }

        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
        .modal-content { background-color: white; padding: 30px; border-radius: 12px; max-width: 450px; width: 90%; text-align: center; position: relative; box-shadow: 0 5px 25px rgba(0,0,0,0.2); }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; color: #aaa; }
        .close-btn:hover { color: black; }
        .emotion-tag-list { font-size: 11px; line-height: 1.6; color: #555; }
    </style>
</head>
<body>

    <h1>Edge AI 工業級多目標考勤與高精度情緒分析系統</h1>
    <div class="subtitle">視覺化升級版：動態採樣全情緒矩陣機率分佈，支援自動清除背景誤判非人頭噪點</div>

    <div id="status" class="status">初始化本地 AI 特徵庫與加載 INT8 表情大模型中...</div>

    <div class="container">
        <div class="video-box">
            <video id="video" autoplay muted playsinline></video>
            <canvas id="overlay"></canvas>
        </div>

        <div class="control-panel">
            <button class="btn btn-success" onclick="exportCSV()" style="margin-bottom: 15px;">匯出考勤與精細情緒報告 (CSV)</button>
            <h3 style="margin: 10px 0;">即時考勤與精細化表情監測表</h3>
            <div class="log-table-container">
                <table>
                    <thead>
                        <tr>
                            <th>用戶標籤 (點擊看圓餅圖)</th>
                            <th>狀態</th>
                            <th>總停留時長</th>
                            <th>當前表情</th>
                            <th>情緒詳細佔比分佈 (📉 實時採樣)</th>
                        </tr>
                    </thead>
                    <tbody id="logTrack"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="manager-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px;">
            <h3 style="margin: 0;">視覺化用戶名冊（具備 10s 自動背景防噪剔除功能）</h3>
            <button class="btn btn-warning" onclick="mergeSelectedUsers()">合併選中的用戶特徵</button>
        </div>
        <div class="user-grid" id="userGrid"></div>
    </div>

    <div id="chartModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h3 id="modalTitle" style="margin-top: 0; color: #2c3e50;">用戶情緒心理圖表</h3>
            <div style="width: 100%; height: 280px; display: flex; justify-content: center; align-items: center;">
                <canvas id="pieChartCanvas"></canvas>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('overlay');
        const statusDiv = document.getElementById('status');
        const userGrid = document.getElementById('userGrid');
        
        let faceMatcher = null;
        let labeledFaceDescriptors = [];
        let userDatabase = {}; 
        let emotionSession = null; 
        
        let lastLoopTime = Date.now();
        let lastCleanTime = Date.now(); // 記錄上一次清理噪點的時間
        const AWAY_TIMEOUT = 5000; 
        const MATCH_THRESHOLD = 0.65; 
        const CLEAN_INTERVAL = 10000; // 每 10000 毫秒 (10秒) 執行一次無效頭像清理

        let currentChartInstance = null;
        let activeModalUser = null;

        const emotionMap = {
            0: "中性", 1: "愉悅", 2: "疲憊", 3: "嚴肅", 4: "緊張", 5: "驚訝", 6: "反感", 7: "輕蔑"
        };
        const emotionKeys = ["neutral", "happy", "sad", "angry", "fearful", "surprised", "disgusted", "contempt"];
        const emotionColors = [
            '#95a5a6', '#2ecc71', '#34495e', '#e74c3c', '#9b59b6', '#f1c40f', '#e67e22', '#d35400'
        ];

        async function init() {
            try {
                statusDiv.innerText = "⏳ 正在從本目錄下載並初始化你上傳的 emotion-ferplus-12-int8.onnx 模型...";
                
                const FACE_MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
                await faceapi.nets.ssdMobilenetv1.loadFromUri(FACE_MODEL_URL);
                await faceapi.nets.faceLandmark68Net.loadFromUri(FACE_MODEL_URL);
                await faceapi.nets.faceRecognitionNet.loadFromUri(FACE_MODEL_URL);
                
                const onnxModelUrl = './emotion-ferplus-12-int8.onnx';
                const options = { executionProviders: ['webgpu', 'webgl', 'wasm'] };
                emotionSession = await ort.InferenceSession.create(onnxModelUrl, options);
                
                statusDiv.innerHTML = "🚀 <span style='color: #2ecc71;'>本地 INT8 智慧去噪大模型成功綁定！硬體全速監控中</span>";
                startVideo();
            } catch (err) {
                statusDiv.innerHTML = "❌ 模型載入失敗，請確認檔名是否與倉庫內完全一致: " + err.message;
            }
        }

        function startVideo() {
            navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } })
                .then(stream => {
                    video.srcObject = stream;
                    video.addEventListener('play', () => {
                        lastLoopTime = Date.now();
                        lastCleanTime = Date.now();
                        onProcessLoop();
                    });
                })
                .catch(err => { statusDiv.innerText = "無法獲取相機: " + err.message; });
            renderUserGrid();
        }

        function generateFeatureName(descriptor) {
            let hash = 0;
            for (let i = 0; i < 5; i++) { hash += Math.abs(descriptor[i]) * Math.sin(i); }
            const hexCode = Math.floor(Math.abs(hash) * 10000).toString(16).toUpperCase().substring(0, 4);
            return `成員-${hexCode}`;
        }

        function cropFaceImage(videoEl, box) {
            try {
                const tempCanvas = document.createElement('canvas');
                const tCtx = tempCanvas.getContext('2d');
                const padX = box.width * 0.2; const padY = box.height * 0.2;
                tempCanvas.width = 120; tempCanvas.height = 120;
                tCtx.drawImage(videoEl, box.x - padX/2, box.y - padY/2, box.width + padX, box.height + padY, 0, 0, 120, 120);
                return tempCanvas.toDataURL('image/jpeg', 0.8);
            } catch (e) { return ''; }
        }

        async function predictExpressionAccurate(videoEl, faceBox) {
            if (!emotionSession) return 0; 
            try {
                const canvasBox = document.createElement('canvas');
                const ctxBox = canvasBox.getContext('2d');
                canvasBox.width = 64; canvasBox.height = 64;
                ctxBox.drawImage(videoEl, faceBox.x, faceBox.y, faceBox.width, faceBox.height, 0, 0, 64, 64);
                const imgData = ctxBox.getImageData(0, 0, 64, 64);
                
                const inputBuffer = new Float32Array(64 * 64);
                for (let i = 0; i < imgData.data.length; i += 4) {
                    const r = imgData.data[i]; const g = imgData.data[i+1]; const b = imgData.data[i+2];
                    inputBuffer[i / 4] = 0.299 * r + 0.587 * g + 0.114 * b; 
                }
                
                const inputTensor = new ort.Tensor('float32', inputBuffer, [1, 1, 64, 64]);
                const inputName = emotionSession.inputNames[0]; 
                const feeds = {}; feeds[inputName] = inputTensor;
                const results = await emotionSession.run(feeds);
                const outputName = emotionSession.outputNames[0];
                const outputData = results[outputName].data; 
                
                let maxIndex = 0; let maxVal = outputData[0];
                for (let i = 1; i < outputData.length; i++) {
                    if (outputData[i] > maxVal) { maxVal = outputData[i]; maxIndex = i; }
                }
                return maxIndex; 
            } catch (e) { return 0; }
        }

        function formatDuration(ms) {
            let totalSecs = Math.floor(ms / 1000);
            let hours = Math.floor(totalSecs / 3600);
            let minutes = Math.floor((totalSecs % 3600) / 60);
            let seconds = totalSecs % 60;
            return `${hours > 0 ? hours + '時' : ''}${minutes > 0 || hours > 0 ? minutes + '分' : ''}${seconds}秒`;
        }

        async function onProcessLoop() {
            if (video.paused || video.ended) return setTimeout(() => onProcessLoop(), 1000);

            const now = Date.now();
            const deltaTime = now - lastLoopTime;
            lastLoopTime = now;

            const detections = await faceapi.detectAllFaces(video).withFaceLandmarks().withFaceDescriptors();
            const displaySize = { width: 640, height: 480 };
            faceapi.matchDimensions(canvas, displaySize);
            const resizedDetections = faceapi.resizeResults(detections, displaySize);
            
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            let currentFrameDetectedNames = new Set();

            for (let i = 0; i < resizedDetections.length; i++) {
                const detection = resizedDetections[i];
                let matchedName = null;
                const detectionScore = detection.detection.score; // 獲取當前捕獲的置信度

                if (faceMatcher && labeledFaceDescriptors.length > 0) {
                    const bestMatch = faceMatcher.findBestMatch(detection.descriptor);
                    if (bestMatch.label !== 'unknown' && bestMatch.distance < MATCH_THRESHOLD) {
                        matchedName = bestMatch.label;
                    }
                }

                const emotionIdx = await predictExpressionAccurate(video, detection.detection.box);
                const chEmotion = emotionMap[emotionIdx];
                const emotionKey = emotionKeys[emotionIdx];

                if (!matchedName) {
                    matchedName = generateFeatureName(detection.descriptor);
                    let finalName = matchedName;
                    let counter = 1;
                    while (userDatabase[finalName]) { finalName = `${matchedName}_${counter}`; counter++; }
                    matchedName = finalName;

                    const avatarDataUrl = cropFaceImage(video, detection.detection.box);
                    labeledFaceDescriptors.push(new faceapi.LabeledFaceDescriptors(matchedName, [detection.descriptor]));
                    faceMatcher = new faceapi.FaceMatcher(labeledFaceDescriptors);

                    // 在數據庫中新增最高置信度記錄 (maxDetectionScore)，初始為當前值
                    userDatabase[matchedName] = { 
                        count: 1, lastSeenTimestamp: now, status: "在線", avatar: avatarDataUrl,
                        totalDuration: 0, currentExpression: chEmotion, maxDetectionScore: detectionScore,
                        emotionHistory: { neutral: 0, happy: 0, sad: 0, angry: 0, fearful: 0, surprised: 0, disgusted: 0, contempt: 0 }
                    };
                    userDatabase[matchedName].emotionHistory[emotionKey] = 1;
                    renderUserGrid();
                } else {
                    const targetUser = labeledFaceDescriptors.find(l => l.label === matchedName);
                    if (targetUser && targetUser.descriptors.length < 30) {
                        targetUser.descriptors.push(detection.descriptor);
                        faceMatcher = new faceapi.FaceMatcher(labeledFaceDescriptors);
                    }
                }

                currentFrameDetectedNames.add(matchedName);

                if (userDatabase[matchedName]) {
                    const user = userDatabase[matchedName];
                    if (user.status === "在線") user.totalDuration += deltaTime;
                    
                    const timeElapsed = now - user.lastSeenTimestamp;
                    if (user.status === "離開" && timeElapsed > AWAY_TIMEOUT) user.count += 1;

                    // 刷新最高辨識分數
                    if (detectionScore > user.maxDetectionScore) {
                        user.maxDetectionScore = detectionScore;
                    }

                    user.lastSeenTimestamp = now;
                    user.status = "在線";
                    user.currentExpression = chEmotion;
                    user.emotionHistory[emotionKey] += 1;

                    if (activeModalUser === matchedName && currentChartInstance) {
                        updateLivePieChart(user.emotionHistory);
                    }
                }

                const box = detection.detection.box;
                const drawBox = new faceapi.draw.DrawBox(box, { label: `${matchedName} [${chEmotion}]` });
                drawBox.draw(canvas);
            }

            for (let name in userDatabase) {
                if (!currentFrameDetectedNames.has(name)) {
                    if (now - userDatabase[name].lastSeenTimestamp > AWAY_TIMEOUT) {
                        userDatabase[name].status = "離開";
                    }
                }
            }

            // 【核心去噪功能】：每 10 秒自動檢查並踢除無效物件
            if (now - lastCleanTime > CLEAN_INTERVAL) {
                checkAndCleanFalseDetections();
                lastCleanTime = now;
            }

            renderTable();
            setTimeout(() => onProcessLoop(), 150); 
        }

        // 定期自動清洗函數：檢查並刪除極可能是背景或陰影誤判的標籤
        function checkAndCleanFalseDetections() {
            let changeDetected = false;
            for (let name in userDatabase) {
                const user = userDatabase[name];
                
                // 剔除核心邏輯：
                // 1. 該目標目前處於「已離開」狀態
                // 2. 且它的一生中最高人臉辨識分數小於 0.82 (真正的人類正臉分數通常在 0.90 ~ 0.99 之間，而背景雜訊往往只有 0.4 ~ 0.7)
                // 3. 且累計被偵測到的有效時長極短 (小於 3 秒)，說明只是鏡頭晃過或背景偶發性誤判
                if (user.status === "離開" && user.maxDetectionScore < 0.82 && user.totalDuration < 3000) {
                    
                    console.log(`[系統去噪] 自動移除疑似背景非人頭物件: ${name} (最高置信度: ${user.maxDetectionScore.toFixed(2)})`);
                    
                    // 如果這個死掉的標籤剛好開著圓餅圖，關閉它
                    if (activeModalUser === name) closeModal();

                    // 從主數據庫刪除
                    delete userDatabase[name];
                    // 從 face-api.js 的特徵比對庫中清除
                    labeledFaceDescriptors = labeledFaceDescriptors.filter(l => l.label !== name);
                    
                    changeDetected = true;
                }
            }

            if (changeDetected) {
                // 重新封裝人臉比對器並刷新頭像名冊佈局
                faceMatcher = labeledFaceDescriptors.length > 0 ? new faceapi.FaceMatcher(labeledFaceDescriptors) : null;
                renderUserGrid();
            }
        }

        function generateDetailedEmotionHTML(emotionHistory) {
            let totalDataPoints = 0;
            for (let key in emotionHistory) { totalDataPoints += emotionHistory[key]; }
            if (totalDataPoints === 0) return "<span style='color:#aaa;'>採樣中...</span>";

            let items = [];
            for (let i = 0; i < emotionKeys.length; i++) {
                const key = emotionKeys[i];
                const count = emotionHistory[key];
                if (count > 0) {
                    const percentage = Math.round((count / totalDataPoints) * 100);
                    if (percentage > 0) {
                        items.push(`<span class="badge" style="background:${emotionColors[i]}; color:white; margin-right:2px; display:inline-block; margin-bottom:2px;">${emotionMap[i]} ${percentage}%</span>`);
                    }
                }
            }
            return `<div class="emotion-tag-list">${items.join('')}</div>`;
        }

        function renderTable() {
            const tbody = document.getElementById('logTrack');
            tbody.innerHTML = '';
            for (let name in userDatabase) {
                const tr = document.createElement('tr');
                const user = userDatabase[name];
                const statusBadge = user.status === "在線" ? `<span class="badge badge-active">在線</span>` : `<span class="badge badge-away">已離開</span>`;
                
                const detailedHTML = generateDetailedEmotionHTML(user.emotionHistory);

                tr.innerHTML = `
                    <td><strong class="clickable-name" onclick="openChartModal('${name}')">${name} 📊</strong></td>
                    <td>${statusBadge}</td>
                    <td><span style="color:#16a085; font-weight:bold;">${formatDuration(user.totalDuration)}</span></td>
                    <td><span style="color:#9b59b6; font-weight:bold;">${user.currentExpression}</span></td>
                    <td>${detailedHTML}</td>
                `;
                tbody.appendChild(tr);
            }
        }

        function openChartModal(userName) {
            const user = userDatabase[userName];
            if (!user) return;
            activeModalUser = userName;
            document.getElementById('modalTitle').innerText = `📊 ${userName} 的綜合情緒圓餅圖`;
            document.getElementById('chartModal').style.display = 'flex';

            const ctxPie = document.getElementById('pieChartCanvas').getContext('2d');
            const dataValues = emotionKeys.map(key => user.emotionHistory[key]);
            const labels = emotionKeys.map((_, idx) => emotionMap[idx]);

            if (currentChartInstance) {
                currentChartInstance.destroy(); 
            }

            currentChartInstance = new Chart(ctxPie, {
                type: 'pie',
                data: {
                    labels: labels,
                    datasets: [{
                        data: dataValues,
                        backgroundColor: emotionColors,
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } }
                    }
                }
            });
        }

        function updateLivePieChart(emotionHistory) {
            if (!currentChartInstance) return;
            const dataValues = emotionKeys.map(key => emotionHistory[key]);
            currentChartInstance.data.datasets[0].data = dataValues;
            currentChartInstance.update('none'); 
        }

        function closeModal() {
            document.getElementById('chartModal').style.display = 'none';
            activeModalUser = null;
            if (currentChartInstance) {
                currentChartInstance.destroy();
                currentChartInstance = null;
            }
        }

        function renderUserGrid() {
            userGrid.innerHTML = '';
            for (let name in userDatabase) {
                const user = userDatabase[name];
                const card = document.createElement('div');
                card.className = 'user-card'; card.id = `card-${name}`;
                card.innerHTML = `
                    <input type="checkbox" class="user-checkbox" value="${name}" onchange="toggleCardSelect('${name}', this)">
                    <img class="user-avatar" src="${user.avatar || 'https://via.placeholder.com/100'}" alt="Face">
                    <div style="font-size: 12px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 100%;">${name}</div>
                `;
                userGrid.appendChild(card);
            }
        }

        function toggleCardSelect(name, checkbox) {
            const card = document.getElementById(`card-${name}`);
            if (checkbox.checked) card.classList.add('selected');
            else card.classList.remove('selected');
        }

        function mergeSelectedUsers() {
            const checkboxes = document.querySelectorAll('.user-checkbox:checked');
            if (checkboxes.length < 2) { alert("請至少勾選 2 個或以上的頭像進行合併！"); return; }

            const namesToMerge = Array.from(checkboxes).map(cb => cb.value);
            const primaryName = namesToMerge[0];
            
            if (!confirm(`確定要將其餘標籤合併到 ${primaryName} 嗎？\n時長、次數及所有情緒分佈百分比將全方位合流。`)) return;

            const primaryUserInDB = userDatabase[primaryName];
            const primaryUserInAI = labeledFaceDescriptors.find(l => l.label === primaryName);

            for (let i = 1; i < namesToMerge.length; i++) {
                const secondaryName = namesToMerge[i];
                const secondaryUserInDB = userDatabase[secondaryName];
                
                primaryUserInDB.count += secondaryUserInDB.count;
                primaryUserInDB.totalDuration += secondaryUserInDB.totalDuration;
                if (secondaryUserInDB.lastSeenTimestamp > primaryUserInDB.lastSeenTimestamp) {
                    primaryUserInDB.lastSeenTimestamp = secondaryUserInDB.lastSeenTimestamp;
                }

                // 融合置信度分數
                if (secondaryUserInDB.maxDetectionScore > primaryUserInDB.maxDetectionScore) {
                    primaryUserInDB.maxDetectionScore = secondaryUserInDB.maxDetectionScore;
                }

                for (let key in primaryUserInDB.emotionHistory) {
                    primaryUserInDB.emotionHistory[key] += secondaryUserInDB.emotionHistory[key];
                }

                const secondaryUserInAI = labeledFaceDescriptors.find(l => l.label === secondaryName);
                if (primaryUserInAI && secondaryUserInAI) {
                    primaryUserInAI.descriptors.push(...secondaryUserInAI.descriptors);
                }

                delete userDatabase[secondaryName];
                labeledFaceDescriptors = labeledFaceDescriptors.filter(l => l.label !== secondaryName);
            }

            if (activeModalUser) closeModal();
            faceMatcher = new faceapi.FaceMatcher(labeledFaceDescriptors);
            renderUserGrid(); renderTable();
            alert("多維度精細特徵數據合併成功！");
        }

        function exportCSV() {
            let csvContent = "data:text/csv;charset=utf-8,\uFEFF用戶標籤,累計出現次數,總停留時間(秒),當前表情,狀態,最高置信度\n";
            for (let name in userDatabase) {
                const user = userDatabase[name];
                csvContent += `${name},${user.count},${Math.floor(user.totalDuration / 1000)},${user.currentExpression},${user.status},${user.maxDetectionScore.toFixed(4)}\n`;
            }
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `AI_AntiNoise_Report_${new Date().toISOString().slice(0,10)}.csv`);
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }

        window.onload = init;
    </script>
</body>
</html>
